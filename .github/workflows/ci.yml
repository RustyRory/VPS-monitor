name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vps-monitor-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vps-monitor-app

      - name: Lint
        run: npm run lint
        working-directory: vps-monitor-app

      - name: Test
        run: npm test
        working-directory: vps-monitor-app
