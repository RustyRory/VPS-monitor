<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS — B3 Dev</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-body">

  <header>
    <h1>Applications</h1>
    <p>· VPS 78.138.58.95 ·</p>
  </header>

  <div id="grid" class="grid"></div>

  <footer>
    <a class="monitoring-link" href="/login.html">Monitoring</a>
    <span>
      <a href="https://damien-paszkiewicz.vercel.app/" class="github-link" target="_blank" rel="noopener">Portfolio</a>
      ·
      <a href="https://github.com/RustyRory" class="github-link" target="_blank" rel="noopener">GitHub</a>
      · 2026
    </span>
  </footer>

  <script>
    fetch('/api/apps')
      .then((r) => r.json())
      .then((apps) => {
        const grid = document.getElementById('grid');
        if (!apps.length) { grid.innerHTML = '<p style="color:#475569">Aucune application déployée.</p>'; return; }
        grid.innerHTML = apps.map(({ path }) => `
          <a class="card" href="${path}">
            <span class="label">${path.replace(/\//g, '')}</span>
            <span class="url">${path}</span>
          </a>
        `).join('');
      })
      .catch(() => {});
  </script>

</body>
</html>
